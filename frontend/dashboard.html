<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BC HealthTriage AI - Live Call Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0F172A;--card:#1E293B;--border:#334155;--accent:#38BDF8;
--text:#F1F5F9;--text-dim:#94A3B8;--yellow:#FCBA19;
--red:#EF4444;--orange:#F97316;--amber:#EAB308;--green:#22C55E;--blue:#3B82F6;--purple:#A855F7;--cyan:#06B6D4;--teal:#10B981;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}
/* ========== ANIMATIONS ========== */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 5px rgba(34,197,94,.3)}50%{box-shadow:0 0 20px rgba(34,197,94,.6)}}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-18px) rotate(5deg)}66%{transform:translateY(8px) rotate(-3deg)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-in-top{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce-in{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes waveform{0%,100%{height:15%}50%{height:85%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ========== LAUNCH SCREEN ========== */
#launch{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#launch.hidden{display:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none}
.orb-1{width:500px;height:500px;background:var(--accent);top:-10%;left:-10%}
.orb-2{width:400px;height:400px;background:var(--purple);bottom:-10%;right:-10%}
.orb-3{width:300px;height:300px;background:var(--teal);top:50%;left:60%}
.particle{position:absolute;color:var(--accent);opacity:.2;font-size:20px;animation:float 8s ease-in-out infinite;pointer-events:none}
.launch-logo{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));padding:4px;margin-bottom:24px;animation:bounce-in .8s ease-out}
.launch-logo-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--accent)}
.launch-title{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple),var(--teal));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite;margin-bottom:8px}
.launch-subtitle{font-size:16px;color:var(--text-dim);margin-bottom:40px;letter-spacing:.5px}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:600px;margin-bottom:40px;padding:0 20px}
.feature-card{background:rgba(30,41,59,.6);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;animation:slide-up .6s ease-out backwards}
.feature-card:nth-child(1){animation-delay:.1s}.feature-card:nth-child(2){animation-delay:.2s}.feature-card:nth-child(3){animation-delay:.3s}
.feature-card:nth-child(4){animation-delay:.4s}.feature-card:nth-child(5){animation-delay:.5s}.feature-card:nth-child(6){animation-delay:.6s}
.feature-icon{font-size:28px;margin-bottom:8px}
.feature-label{font-size:13px;font-weight:600;color:var(--text)}
.start-btn{background:var(--yellow);color:#0F172A;border:none;padding:16px 48px;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:.5px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(252,186,25,.3)}

/* ========== HEADER ========== */
#header{display:none;position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(15,23,42,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;align-items:center;justify-content:space-between}
#header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple),var(--teal));background-size:200% 100%;animation:gradient-shift 4s linear infinite}
#header.visible{display:flex}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.header-title{font-size:16px;font-weight:700;color:var(--text)}
.header-sub{font-size:12px;color:var(--text-dim);margin-left:8px;padding-left:8px;border-left:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:16px}
.status-connected{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:500}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse-soft 2s ease-in-out infinite}
.header-clock{font-size:13px;color:var(--text-dim);font-variant-numeric:tabular-nums}

/* ========== DASHBOARD GRID ========== */
#dashboard{display:none;padding:68px 16px 60px;height:100vh;overflow-y:auto}
#dashboard.visible{display:block}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:1400px;margin:0 auto}
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid{grid-template-columns:1fr}}

/* ========== CALL CARD ========== */
.call-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;animation:fade-in .5s ease-out backwards}
.call-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.call-card.active{animation:pulse-glow 2s ease-in-out infinite}
.call-card.selected{border-color:var(--accent);box-shadow:0 0 15px rgba(56,189,248,.2)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-demo{font-size:11px;color:var(--text-dim)}
.cc-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.cc-complaint{font-size:12px;color:var(--text-dim);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.cc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cc-gauge{flex-shrink:0}
.cc-timer{font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums}
.cc-triage{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;color:#fff;white-space:nowrap}
.cc-ai-summary{font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.cc-resolution{font-size:11px;color:var(--text-dim);margin-bottom:8px;opacity:.7}

/* ========== SPLIT VIEW ========== */
#split{display:none;padding:56px 0 52px;height:100vh}
#split.visible{display:flex}
.split-left{flex:2;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.split-right{flex:1;max-width:340px;background:#000;display:flex;align-items:center;justify-content:center;padding:12px}

/* Patient Info Bar */
.patient-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pb-name{font-size:16px;font-weight:700}
.pb-details{display:flex;gap:12px;font-size:12px;color:var(--text-dim)}
.pb-detail{display:flex;align-items:center;gap:4px}
.back-btn{background:rgba(56,189,248,.15);color:var(--accent);border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.back-btn:hover{background:rgba(56,189,248,.3)}

/* Verification Checklist */
.verify-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.verify-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);transition:color .3s}
.verify-item.done{color:var(--green)}
.verify-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .3s}
.verify-item.done .verify-check{background:var(--green);border-color:var(--green);color:#fff}

/* Two-column middle */
.split-middle{display:flex;gap:10px;flex:1;min-height:0}
.transcript-col{flex:1;display:flex;flex-direction:column;min-width:0}
.info-col{width:280px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex-shrink:0}

/* Transcript */
.transcript-box{background:var(--card);border:1px solid var(--border);border-radius:12px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.transcript-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.transcript-body{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5;animation:slide-up .3s ease-out}
.msg-ai{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);align-self:flex-start;border-bottom-left-radius:4px}
.msg-patient{background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.15);align-self:flex-end;border-bottom-right-radius:4px}
.msg-label{font-size:10px;font-weight:600;margin-bottom:2px}
.msg-ai .msg-label{color:var(--accent)}
.msg-patient .msg-label{color:var(--text-dim)}
.highlight{color:var(--cyan);font-weight:600}

/* Accordion */
.accordion{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.acc-header{padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);transition:background .2s}
.acc-header:hover{background:rgba(255,255,255,.03)}
.acc-body{padding:8px 12px;font-size:11px;color:var(--text-dim);line-height:1.6;display:none}
.accordion.open .acc-body{display:block}
.acc-arrow{transition:transform .2s;font-size:10px}
.accordion.open .acc-arrow{transform:rotate(90deg)}

/* Triage + Map row */
.triage-map-row{display:flex;gap:10px}
.triage-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:16px;width:280px;flex-shrink:0}
.triage-label{font-size:11px;color:var(--text-dim)}
.triage-score-text{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums}
.triage-rec{font-size:12px;font-weight:600;margin-top:4px}
.map-section{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:180px;position:relative}
#map{width:100%;height:100%;min-height:180px}
.leaflet-tile-pane{filter:invert(1) hue-rotate(200deg) saturate(.8) brightness(.9)}
.facility-list{position:absolute;top:8px;right:8px;z-index:500;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:6px;max-height:160px;overflow-y:auto;width:200px}
.fac-item{display:flex;align-items:center;gap:6px;padding:4px 6px;font-size:10px;border-radius:4px;cursor:default}
.fac-item:hover{background:rgba(255,255,255,.05)}
.fac-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fac-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.fac-wait{color:var(--text-dim);font-size:9px;white-space:nowrap}

/* ========== PHONE PANEL ========== */
.phone-frame{width:100%;max-width:290px;aspect-ratio:9/19;background:#111;border:3px solid #333;border-radius:36px;position:relative;display:flex;flex-direction:column;overflow:hidden}
.phone-notch{width:120px;height:28px;background:#000;border-radius:0 0 16px 16px;margin:0 auto;position:relative;z-index:2}
.phone-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.phone-caller{text-align:center}
.phone-caller-name{font-size:18px;font-weight:700;color:#fff}
.phone-caller-sub{font-size:12px;color:#94A3B8;margin-top:4px}
.phone-timer{font-size:28px;font-weight:300;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px}
.waveform{display:flex;align-items:center;gap:4px;height:50px}
.wave-bar{width:6px;border-radius:3px;background:linear-gradient(to top,var(--accent),var(--cyan));transition:height .1s ease}
.speaking-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.speaking-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse-soft 1.5s ease-in-out infinite}
.phone-controls{display:flex;gap:20px;margin-top:auto;padding-bottom:30px}
.phone-btn{width:52px;height:52px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.phone-btn:hover{transform:scale(1.1)}
.phone-btn-mic{background:rgba(255,255,255,.15);color:#fff}
.phone-btn-end{background:var(--red);color:#fff}
.phone-btn-vol{background:rgba(255,255,255,.15);color:#fff}

/* ========== BOTTOM BAR ========== */
#bottombar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;height:48px;background:rgba(15,23,42,.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:0 16px;align-items:center;justify-content:center;gap:8px}
#bottombar.visible{display:flex}
.bb-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.bb-item:hover{background:rgba(255,255,255,.05)}
.bb-item.active{border-color:var(--accent);background:rgba(56,189,248,.08)}
.bb-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.bb-dot{width:6px;height:6px;border-radius:50%}
.bb-status{font-size:10px;color:var(--text-dim);display:none}
@media(min-width:768px){.bb-status{display:block}}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* Leaflet overrides */
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:1px solid var(--border)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}
</style>
</head>
<body>

<!-- LAUNCH SCREEN -->
<div id="launch">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div id="particles"></div>
  <div class="launch-logo"><div class="launch-logo-inner">BC</div></div>
  <div class="launch-title">BC HealthTriage AI</div>
  <div class="launch-subtitle">Intelligent Patient Routing for British Columbia</div>
  <div class="feature-grid">
    <div class="feature-card"><div class="feature-icon">🪪</div><div class="feature-label">Verify Identity</div></div>
    <div class="feature-card"><div class="feature-icon">🩺</div><div class="feature-label">Assess Symptoms</div></div>
    <div class="feature-card"><div class="feature-icon">📋</div><div class="feature-label">Review History</div></div>
    <div class="feature-card"><div class="feature-icon">🧠</div><div class="feature-label">AI Triage</div></div>
    <div class="feature-card"><div class="feature-icon">🏥</div><div class="feature-label">Route Patient</div></div>
    <div class="feature-card"><div class="feature-icon">📊</div><div class="feature-label">Track Outcomes</div></div>
  </div>
  <button class="start-btn" onclick="startDemo()">Start Demo</button>
</div>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <div class="header-logo">BC</div>
    <span class="header-title">BC HealthTriage AI</span>
    <span class="header-sub">Live Call Dashboard</span>
  </div>
  <div class="header-right">
    <div class="status-connected"><div class="status-dot"></div>Connected</div>
    <div class="header-clock" id="clock"></div>
  </div>
</div>

<!-- DASHBOARD GRID -->
<div id="dashboard"><div class="grid" id="grid"></div></div>

<!-- SPLIT VIEW -->
<div id="split">
  <div class="split-left" id="splitLeft"></div>
  <div class="split-right" id="splitRight"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar" id="bottombar"></div>

<script>
// ===== DATA =====
const PATIENTS = [
  {
    id:1, name:"Margaret Johnson", initials:"MJ", age:51, sex:"F",
    healthCard:"9876 543 210", complaint:"Chest pain radiating to left arm with shortness of breath",
    triageLevel:"ER Level 1", triageScore:95, triageColor:"#ef4444",
    estimatedResolution:15,
    aiSummary:"Cardiac emergency — elevated troponin, chest pain radiating to left arm",
    routing:"Royal Jubilee Hospital - Emergency",
    conditions:["Hypertension","Hyperlipidemia","Type 2 Diabetes","Coronary Artery Disease"],
    meds:["Metoprolol 50mg BID","Lisinopril 20mg daily","Atorvastatin 40mg daily","Aspirin 81mg daily","Metformin 1000mg BID"],
    allergies:["None known"],
    vitals:{hr:92,bp:"156/95",temp:"37.1",rr:24,o2:94,pain:8},
    delay:0,
    conversation:[
      {role:"ai",text:"Thank you for calling BC HealthLink. I'm your AI health assistant. Can I start with your name and date of birth?"},
      {role:"patient",text:"Margaret Johnson, March 15, 1975. I'm having really bad chest pain right now."},
      {role:"ai",text:"I understand you're experiencing chest pain, Margaret. I want to help you right away. Can you describe the pain - where exactly is it and what does it feel like?"},
      {role:"patient",text:"It's a heavy pressure in the center of my chest, and it's spreading down my left arm. It started about 30 minutes ago."},
      {role:"ai",text:"Margaret, this is very important. Are you also experiencing any shortness of breath, nausea, sweating, or dizziness?"},
      {role:"patient",text:"Yes, I'm sweating a lot and I feel short of breath. I'm really scared."},
      {role:"ai",text:"I understand your concern, and I want you to know I'm here to help. Can you confirm your BC health card number for me?"},
      {role:"patient",text:"It's 9876 543 210. Please, should I call 911?"},
      {role:"ai",text:"Your health card is verified. Margaret, I see you have a history of coronary artery disease, hypertension, and diabetes. Have you taken your aspirin today?"},
      {role:"patient",text:"No, I haven't taken it yet today. The pain is getting worse."},
      {role:"ai",text:"Margaret, please chew one regular aspirin (325mg) right now if you have one available. Do NOT swallow it whole - chew it. This is very important."},
      {role:"patient",text:"Okay, I'm chewing the aspirin now. Should I go to the hospital?"},
      {role:"ai",text:"Yes, Margaret. Based on your symptoms - chest pressure radiating to the left arm, shortness of breath, and diaphoresis, combined with your cardiac history - I am routing you to Royal Jubilee Hospital Emergency immediately. I'm also alerting 911. Do NOT drive yourself."},
      {role:"patient",text:"Okay, my husband can drive me. Thank you for helping me."}
    ]
  },
  {
    id:2, name:"Jose Ramirez", initials:"JR", age:27, sex:"M",
    healthCard:"1234 567 890", complaint:"Right ankle injury during recreational soccer - possible fracture",
    triageLevel:"ER Override Level 3", triageScore:65, triageColor:"#f59e0b",
    estimatedResolution:60,
    aiSummary:"Musculoskeletal injury — possible fracture, patient requests ER",
    routing:"Patient requested ER - Royal Jubilee",
    conditions:[],meds:[],allergies:["None known"],
    vitals:{hr:88,bp:"118/76",temp:"36.8",rr:16,o2:99,pain:7},
    delay:1500,
    conversation:[
      {role:"ai",text:"Welcome to BC HealthLink. I'm your AI health assistant. May I have your name and date of birth?"},
      {role:"patient",text:"Jose Ramirez, July 22, 1999. I hurt my ankle playing soccer."},
      {role:"ai",text:"I'm sorry to hear that, Jose. Can you tell me what happened and which ankle is injured?"},
      {role:"patient",text:"I was playing soccer and someone tackled me hard. My right ankle twisted badly. It's really swollen and I can't put weight on it."},
      {role:"ai",text:"That sounds painful. Can you move your toes? Is there any numbness or tingling in your foot?"},
      {role:"patient",text:"I can wiggle my toes but it hurts a lot. No numbness though. It's swelling up fast."},
      {role:"ai",text:"Good that you have sensation. Can I get your BC health card number to pull up your file?"},

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ===== PARTICLES =====
function createParticles() {
  const container = document.getElementById('particles');
  const icons = ['♦','✚','+','♦','✚','+','♦','✚','+','♦','✚','+'];
  icons.forEach((icon, i) => {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = icon;
    p.style.left = Math.random()*90+'%';
    p.style.top = Math.random()*90+'%';
    p.style.animationDelay = (i*0.7)+'s';
    p.style.animationDuration = (6+Math.random()*6)+'s';
    p.style.fontSize = (14+Math.random()*18)+'px';
    container.appendChild(p);
  });
}

// ===== STATUS HELPERS =====
function getStatusBadge(status) {
  const map = {
    waiting: {emoji:'⏳',label:'Waiting',bg:'rgba(148,163,184,.15)',color:'#94A3B8'},
    ringing: {emoji:'📞',label:'Ringing',bg:'rgba(251,191,36,.15)',color:'#FBB024'},
    connected: {emoji:'🟢',label:'Connected',bg:'rgba(34,197,94,.15)',color:'#22C55E'},
    verifying: {emoji:'🔍',label:'Verifying',bg:'rgba(56,189,248,.15)',color:'#38BDF8'},
    assessing: {emoji:'🧠',label:'Assessing',bg:'rgba(168,85,247,.15)',color:'#A855F7'},
    complete: {emoji:'✅',label:'Complete',bg:'rgba(34,197,94,.15)',color:'#22C55E'}
  };
  return map[status] || map.waiting;
}

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDurationLong(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function highlightMedical(text) {
  let result = text;
  MEDICAL_KEYWORDS.forEach(kw => {
    const regex = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    result = result.replace(regex, '<span class="highlight">$1</span>');
  });
  return result;
}

// ===== MINI GAUGE SVG =====
function miniGaugeSVG(score, color, size=36) {
  const r = (size-6)/2, cx = size/2, cy = size/2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score/100)*circ;
  return `<svg class="cc-gauge" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#334155" stroke-width="3"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
      fill="${color}" font-size="${size*.28}px" font-weight="700" font-family="Inter">${score}</text>
  </svg>`;
}

// ===== LARGE GAUGE SVG =====
function largeGaugeSVG(score, color) {
  const size=110, r=46, cx=55, cy=55;
  const circ = 2*Math.PI*r;
  const offset = circ - (score/100)*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#334155" stroke-width="6"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" fill="${color}" font-size="28px" font-weight="800" font-family="Inter">${score}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#94A3B8" font-size="10px" font-family="Inter">/ 100</text>
  </svg>`;
}

// ===== SORT PATIENTS BY URGENCY =====
function getSortedPatients() {
  return [...PATIENTS].sort((a, b) => {
    if (b.triageScore !== a.triageScore) return b.triageScore - a.triageScore;
    const csA = callStates[a.id] || { duration: 0 };
    const csB = callStates[b.id] || { duration: 0 };
    return csB.duration - csA.duration;
  });
}

function reorderGrid() {
  const grid = document.getElementById('grid');
  const sorted = getSortedPatients();
  sorted.forEach(p => {
    const card = document.getElementById('card-' + p.id);
    if (card) grid.appendChild(card);
  });
}

let gridBuilt = false;
function renderGrid() {
  const grid = document.getElementById('grid');
  if (!gridBuilt) {
    // Initial full build with animations, sorted by urgency
    grid.innerHTML = '';
    const sorted = getSortedPatients();
    sorted.forEach((p, i) => {
      const card = document.createElement('div');
      card.id = 'card-' + p.id;
      card.className = 'call-card';
      card.style.animationDelay = (i*0.08)+'s';
      card.onclick = () => selectCall(p.id);
      card.innerHTML = `
        <div class="cc-top">
          <div class="cc-avatar" style="background:${p.triageColor}">${p.initials}</div>
          <div class="cc-info">
            <div class="cc-name">${p.name}</div>
            <div class="cc-demo">${p.age}${p.sex} | ${p.healthCard}</div>
          </div>
          <span class="cc-badge" id="badge-${p.id}"></span>
        </div>
        <div class="cc-complaint">${p.complaint}</div>
        <div class="cc-ai-summary">${p.aiSummary}</div>
        <div class="cc-resolution">Est. ~${p.estimatedResolution} min</div>
        <div class="cc-bottom">
          <span class="cc-gauge" id="gauge-${p.id}"></span>
          <span class="cc-timer" id="timer-${p.id}">--:--</span>
          <span class="cc-triage" style="background:${p.triageColor}">${p.triageLevel}</span>
        </div>`;
      grid.appendChild(card);
    });
    gridBuilt = true;
  }
  // In-place updates only (no DOM rebuild, no animation restart)
  PATIENTS.forEach(p => {
    const cs = callStates[p.id];
    const sb = getStatusBadge(cs.status);
    const isActive = ['connected','verifying','assessing'].includes(cs.status);
    const displayScore = Math.round(p.triageScore * cs.triageProgress);
    const card = document.getElementById('card-' + p.id);
    if (!card) return;
    // Update classes without triggering animation restart
    const wantActive = isActive ? ' active' : '';
    const wantSelected = selectedCallId === p.id ? ' selected' : '';
    const newClass = 'call-card' + wantActive + wantSelected;
    if (card.className !== newClass) card.className = newClass;
    // Update badge
    const badge = document.getElementById('badge-' + p.id);
    if (badge) { badge.style.background = sb.bg; badge.style.color = sb.color; badge.textContent = sb.emoji + ' ' + sb.label; }
    // Update gauge
    const gauge = document.getElementById('gauge-' + p.id);
    if (gauge) gauge.innerHTML = miniGaugeSVG(displayScore, p.triageColor);
    // Update timer
    const timer = document.getElementById('timer-' + p.id);
    if (timer) timer.textContent = cs.started ? formatDuration(cs.duration) : '--:--';
  });
  // Reorder cards by urgency
  reorderGrid();
}

          </div>
          <div class="accordion${p.meds.length?' open':''}">
            <div class="acc-header" onclick="this.parentElement.classList.toggle('open')"><span>💊 Medications</span><span class="acc-arrow">▶</span></div>
            <div class="acc-body">${p.meds.length ? p.meds.map(m=>'• '+m).join('<br>') : 'None on file'}</div>
          </div>
          <div class="accordion open">
            <div class="acc-header" onclick="this.parentElement.classList.toggle('open')"><span>⚠️ Allergies</span><span class="acc-arrow">▶</span></div>
            <div class="acc-body">${p.allergies.map(a=>'• '+a).join('<br>')}</div>
          </div>
        </div>
      </div>
      <div class="triage-map-row">
        <div class="triage-section">
          <div id="sp-gauge"></div>
          <div>
            <div class="triage-label">Triage Score</div>
            <div class="triage-rec" id="sp-triage-rec" style="color:${p.triageColor}">${p.triageLevel}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:4px">→ ${p.routing}</div>
          </div>
        </div>
        <div class="map-section">
          <div id="map"></div>
          <div class="facility-list">
            ${FACILITIES.filter(f=>f.id!=='FAC-012').map(f=>
              `<div class="fac-item"><div class="fac-dot" style="background:${f.color}"></div><span class="fac-name">${f.name}</span><span class="fac-wait">${f.wait}${f.closed?' ⛔':''}</span></div>`
            ).join('')}
          </div>
        </div>
      </div>`;

    // Phone panel - build once
    const right = document.getElementById('splitRight');
    right.innerHTML = `
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-content">
          <div class="phone-caller">
            <div class="phone-caller-name">BC Health Line</div>
            <div class="phone-caller-sub" id="sp-phone-name">${p.name}</div>
          </div>
          <div class="phone-timer" id="sp-phone-timer">00:00:00</div>
          <div class="waveform" id="waveform">
            ${Array(8).fill(0).map(()=>`<div class="wave-bar" style="height:20%"></div>`).join('')}
          </div>
          <div class="speaking-indicator" id="sp-speaking"></div>
          <div class="phone-controls">
            <button class="phone-btn phone-btn-mic">🎤</button>
            <button class="phone-btn phone-btn-end">📞</button>
            <button class="phone-btn phone-btn-vol">🔊</button>
          </div>
        </div>
      </div>`;

    // Init map once for this patient
    setTimeout(initMap, 100);
  }

  // === In-place updates only (no DOM rebuild) ===

  // Status badge
  const spStatus = document.getElementById('sp-status');
  if (spStatus) { spStatus.style.color = sb.color; spStatus.textContent = sb.emoji + ' ' + sb.label; }

  // Verification checks
  for (let i = 0; i < 5; i++) {
    const vi = document.getElementById('sp-v' + i);
    const vc = document.getElementById('sp-vc' + i);
    if (vi) vi.className = 'verify-item' + (cs.checks[i] ? ' done' : '');
    if (vc) vc.textContent = cs.checks[i] ? '✓' : '';
  }

  // Transcript - only append new messages (never rebuild)
  const tb = document.getElementById('transcriptBody');
  if (tb && cs.transcriptIndex > lastTranscriptCount) {
    for (let i = lastTranscriptCount; i < cs.transcriptIndex; i++) {
      const msg = p.conversation[i];
      if (!msg) continue;
      const div = document.createElement('div');
      div.className = 'msg msg-' + (msg.role === 'ai' ? 'ai' : 'patient');
      div.innerHTML = `<div class="msg-label">${msg.role==='ai'?'🤖 AI Assistant':'👤 '+p.name}</div>${highlightMedical(msg.text)}`;
      tb.appendChild(div);
    }
    lastTranscriptCount = cs.transcriptIndex;
    tb.scrollTop = tb.scrollHeight;
  }

  // Triage gauge
  const spGauge = document.getElementById('sp-gauge');
  if (spGauge) spGauge.innerHTML = largeGaugeSVG(displayScore, p.triageColor);

  // Phone timer
  const spTimer = document.getElementById('sp-phone-timer');
  if (spTimer) spTimer.textContent = cs.started ? formatDurationLong(cs.duration) : '00:00:00';

  // Speaking indicator
  const isActive = ['connected','verifying','assessing'].includes(cs.status);
  const spSpeaking = document.getElementById('sp-speaking');
  if (spSpeaking) {
    spSpeaking.innerHTML = isActive
      ? '<div class="speaking-dot"></div><span>' + (cs.transcriptIndex % 2 === 0 ? 'Assistant speaking' : 'Listening...') + '</span>'
      : '<span>' + (cs.status==='complete' ? 'Call ended' : 'Waiting...') + '</span>';
  }
}

// ===== MAP =====
function initMap() {
  const mapEl = document.getElementById('map');
  if (!mapEl) return;
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  leafletMap = L.map('map', {zoomControl:true, attributionControl:false}).setView([48.45, -123.38], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18
  }).addTo(leafletMap);
  FACILITIES.forEach(f => {
    if (f.id === 'FAC-012') return; // skip virtual
    const marker = L.circleMarker([f.lat, f.lng], {
      radius: 7, fillColor: f.color, color: '#fff', weight: 1.5, fillOpacity: 0.9
    }).addTo(leafletMap);
    marker.bindPopup(`<strong>${f.name}</strong><br>${f.type} | Wait: ${f.wait}`);
  });
  setTimeout(() => leafletMap.invalidateSize(), 200);
}

// ===== VIEW TRANSITIONS =====
function showView(view) {
  currentView = view;
  document.getElementById('launch').classList.toggle('hidden', view !== 'launch');
  document.getElementById('header').classList.toggle('visible', view !== 'launch');
  document.getElementById('dashboard').classList.toggle('visible', view === 'dashboard');
  document.getElementById('split').classList.toggle('visible', view === 'split');
  document.getElementById('bottombar').classList.toggle('visible', view !== 'launch');
}

function selectCall(id) {
  if (selectedCallId !== id) splitBuiltForId = null; // force rebuild for new patient
  selectedCallId = id;
  showView('split');
  renderSplit();
  renderBottomBar();
}

function backToGrid() {
  selectedCallId = null;
  splitBuiltForId = null;
  showView('dashboard');
  renderGrid();
  renderBottomBar();
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
}

// ===== SIMULATION =====
function startDemo() {
  initCallStates();
  gridBuilt = false;
  bottomBarBuilt = false;
  splitBuiltForId = null;
  showView('dashboard');
  renderGrid();
  renderBottomBar();

  // Start calls with staggered delays
  const delays = [0, 1500, 3000, 2000, 4500, 5500];
  PATIENTS.forEach((p, i) => {
    setTimeout(() => {
      callStates[p.id].status = 'ringing';
      callStates[p.id].started = true;
      renderAll();
      setTimeout(() => {
        callStates[p.id].status = 'connected';
        renderAll();
      }, 1500);
    }, delays[i]);
  });

  // Duration timer
  durationInterval = setInterval(() => {
    PATIENTS.forEach(p => {
      const cs = callStates[p.id];
      if (cs.started && cs.status !== 'waiting' && cs.status !== 'complete') {
        cs.duration++;
      }
    });
    renderAll();
  }, 1000);

  // Transcript advancement every 3s
  simInterval = setInterval(() => {
    PATIENTS.forEach(p => {
      const cs = callStates[p.id];
      if (!cs.started || cs.status === 'waiting' || cs.status === 'ringing' || cs.status === 'complete') return;
      if (cs.transcriptIndex >= p.conversation.length) return;

      // 30% skip chance for natural pacing
      if (Math.random() < 0.3) return;

      cs.transcriptIndex++;
      const progress = cs.transcriptIndex / p.conversation.length;

      // Update verification checks
      if (progress >= 0.10) cs.checks[0] = true;
      if (progress >= 0.25) cs.checks[1] = true;
      if (progress >= 0.50) cs.checks[2] = true;
      if (progress >= 0.70) cs.checks[3] = true;
      if (progress >= 0.90) cs.checks[4] = true;

      // Update triage progress
      cs.triageProgress = Math.min(1, progress * 1.1);

      // Update status
      if (progress >= 1) {
        cs.status = 'complete';
        cs.triageProgress = 1;
        cs.checks = [true,true,true,true,true];
      } else if (progress >= 0.5) {
        cs.status = 'assessing';
      } else if (progress >= 0.25) {
        cs.status = 'verifying';
      }
    });
    renderAll();
  }, 3000);

  // Waveform animation
  waveformInterval = setInterval(() => {
    const bars = document.querySelectorAll('#waveform .wave-bar');
    bars.forEach(bar => {
      bar.style.height = (15 + Math.random() * 70) + '%';
    });
  }, 100);

  // Clock
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}

function renderAll() {
  if (currentView === 'dashboard') {
    renderGrid();
  } else if (currentView === 'split') {
    renderSplit();
  }
  renderBottomBar();
}

// ===== INIT =====
createParticles();
updateClock();
</script>
