<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILA — Guided Investor Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0F172A;--card:#1E293B;--border:#334155;--accent:#38BDF8;
--text:#F1F5F9;--text-dim:#94A3B8;--yellow:#FCBA19;
--red:#EF4444;--orange:#F97316;--amber:#EAB308;--green:#22C55E;
--blue:#3B82F6;--purple:#A855F7;--cyan:#06B6D4;--teal:#10B981;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ========== ANIMATIONS ========== */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 5px rgba(34,197,94,.3)}50%{box-shadow:0 0 20px rgba(34,197,94,.6)}}
@keyframes pulse-glow-amber{0%,100%{box-shadow:0 0 5px rgba(249,115,22,.3)}50%{box-shadow:0 0 20px rgba(249,115,22,.6)}}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-18px) rotate(5deg)}66%{transform:translateY(8px) rotate(-3deg)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-in-top{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce-in{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-down{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing-dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes checkmark-pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes clickable-ring{0%{box-shadow:0 0 0 0 rgba(56,189,248,.6)}70%{box-shadow:0 0 0 10px rgba(56,189,248,0)}100%{box-shadow:0 0 0 0 rgba(56,189,248,0)}}
@keyframes counter-pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes row-slide{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow-border{0%,100%{border-color:rgba(56,189,248,.3)}50%{border-color:rgba(56,189,248,.8)}}

/* ========== GLASS ========== */
.glass{background:rgba(30,41,59,.6);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px}
.glass-dark{background:rgba(15,23,42,.8);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px}

/* ========== LAUNCH ========== */
#launch-screen{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#launch-screen.hidden{opacity:0;pointer-events:none}
.launch-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none}
.launch-orb-1{width:500px;height:500px;background:var(--accent);top:-10%;left:-10%;animation:float 12s ease-in-out infinite}
.launch-orb-2{width:400px;height:400px;background:var(--purple);bottom:-10%;right:-10%;animation:float 10s ease-in-out infinite 2s}
.launch-orb-3{width:300px;height:300px;background:var(--teal);top:50%;left:60%;animation:float 14s ease-in-out infinite 4s}
.launch-logo{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));padding:4px;margin-bottom:24px;animation:bounce-in .8s ease-out}
.launch-logo-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:var(--accent)}
.launch-title{font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple),var(--teal));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite;margin-bottom:8px}
.launch-subtitle{font-size:18px;color:var(--text-dim);margin-bottom:48px;letter-spacing:.5px}
.start-btn{background:var(--yellow);color:#0F172A;border:none;padding:18px 56px;border-radius:14px;font-size:20px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:.5px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(252,186,25,.3)}

/* ========== HEADER ========== */
#demo-header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:none;align-items:center;justify-content:space-between}
#demo-header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple),var(--teal));background-size:200% 100%;animation:gradient-shift 4s linear infinite}
#demo-header.visible{display:flex}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.hdr-brand{font-size:16px;font-weight:700}
.hdr-scene{font-size:13px;color:var(--text-dim);margin-left:12px;padding-left:12px;border-left:1px solid var(--border)}
.hdr-right{display:flex;align-items:center;gap:12px}
#continue-btn{background:var(--accent);color:#0F172A;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;display:none}
#continue-btn:hover{background:#7dd3fc;transform:translateY(-1px)}
#continue-btn.visible{display:flex;align-items:center;gap:6px}

/* ========== SCREENS ========== */
.screen{position:fixed;top:56px;left:0;right:0;bottom:0;display:none;opacity:0;transition:opacity .5s}
.screen.active{display:flex;opacity:1}

/* Phone Only */
#screen-phone-only{background:#000;align-items:center;justify-content:center}

/* Split */
#screen-split{background:var(--bg)}
#split-phone{width:40%;background:#000;display:flex;align-items:center;justify-content:center;padding:20px}
#split-provider{width:60%;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}

/* Dashboard */
#screen-dashboard{background:var(--bg);flex-direction:column;padding:24px 40px;overflow-y:auto}

/* Closing */
#screen-closing{background:var(--bg);align-items:center;justify-content:center;flex-direction:column;padding:40px}

/* ========== PHONE FRAME ========== */
#the-phone{z-index:10}
.phone-frame{width:100%;max-width:300px;aspect-ratio:9/19;background:#111;border:3px solid #444;border-radius:36px;position:relative;display:flex;flex-direction:column;overflow:hidden}
.phone-notch{width:120px;height:28px;background:#000;border-radius:0 0 16px 16px;margin:0 auto;flex-shrink:0}
.phone-status-bar{text-align:center;font-size:11px;font-weight:600;color:var(--accent);padding:4px 0 6px;border-bottom:1px solid #222;flex-shrink:0;background:#111}
#phone-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.phone-home{width:120px;height:4px;background:#555;border-radius:2px;margin:8px auto;flex-shrink:0}

/* Chat Bubbles */
.bubble{max-width:82%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;animation:slide-up .3s ease-out}
.bubble-patient{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;margin-left:auto}
.bubble-ai{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #333}
.bubble-label{font-size:9px;font-weight:600;margin-bottom:2px;opacity:.7}
.bubble-facility{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:10px 13px;align-self:flex-start;margin-top:4px;animation:slide-up .3s ease-out}
.bubble-facility .fac-name{font-size:13px;font-weight:600;color:var(--green)}
.bubble-facility .fac-addr{font-size:11px;color:var(--text-dim);margin-top:2px}
.bubble-facility .fac-note{font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic}

/* Wait status card */
.wait-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;align-self:stretch;margin-top:6px;animation:slide-up .3s ease-out}
.wait-card h4{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent)}
.wait-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.wait-row:last-child{border-bottom:none}
.wait-label{color:var(--text-dim)}
.wait-val{font-weight:600}
.wait-reasons{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.wait-reasons li{font-size:11px;color:var(--text-dim);margin:4px 0;padding-left:12px;position:relative;list-style:none}
.wait-reasons li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-dim);position:absolute;left:0;top:6px}
.wait-explain{font-size:11px;color:var(--text-dim);margin-top:8px;padding:8px;background:rgba(56,189,248,.05);border-radius:6px;font-style:italic}

/* Reroute notification on phone */
.reroute-phone-card{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);border-radius:14px;padding:14px;align-self:stretch;margin-top:6px;animation:slide-down .4s ease-out}
.reroute-phone-card p{font-size:12px;line-height:1.5;color:var(--text);margin-bottom:10px}
.reroute-phone-btns{display:flex;gap:8px}
.reroute-phone-btns button{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.reroute-accept{background:var(--accent);color:#0F172A}
.reroute-stay{background:rgba(255,255,255,.1);color:var(--text)}

/* Typing Indicator */
#phone-typing{display:none;align-self:flex-start;padding:10px 16px;background:var(--card);border-radius:16px;border-bottom-left-radius:4px;border:1px solid #333}
#phone-typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--text-dim);margin:0 2px;animation:typing-dot 1.4s infinite}
#phone-typing span:nth-child(2){animation-delay:.2s}
#phone-typing span:nth-child(3){animation-delay:.4s}

/* ========== PROVIDER PANEL STYLES ========== */

/* Checklist */
.checklist{list-style:none;padding:0}
.checklist li{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:14px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.04);transition:color .3s}
.checklist li.done{color:var(--green)}
.check-icon{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .3s;flex-shrink:0}
.checklist li.done .check-icon{background:var(--green);border-color:var(--green);color:#fff;animation:checkmark-pop .4s ease-out}

/* Patient Card */
.patient-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.patient-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.pc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pc-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.pc-info{flex:1}
.pc-name{font-size:15px;font-weight:600}
.pc-meta{font-size:12px;color:var(--text-dim)}
.pc-complaint{font-size:13px;color:var(--text-dim);margin-bottom:8px;line-height:1.4}
.pc-triage{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pc-score{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.pc-level{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;color:#fff}
.pc-confidence{font-size:11px;color:var(--text-dim)}
.pc-status{font-size:12px;color:var(--accent);font-weight:500;margin-top:6px}
.pc-assessment{font-size:12px;color:var(--text-dim);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* Patient File */
.pf-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.pf-section h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pf-item{font-size:12px}
.pf-label{color:var(--text-dim)}
.pf-val{font-weight:500}
.pf-list{list-style:none;padding:0}
.pf-list li{font-size:12px;color:var(--text);padding:2px 0}

/* AI Assessment card */
.ai-card{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.2);border-radius:12px;padding:14px;position:relative}
.ai-card h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-card p{font-size:13px;line-height:1.5;color:var(--text)}

/* AI Insight Card */
.ai-insight{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);border-radius:12px;padding:14px;animation:slide-up .4s ease-out}
.ai-insight h4{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-insight p{font-size:13px;line-height:1.5;color:var(--text)}

/* Conversation View */
.conv-transcript{max-height:200px;overflow-y:auto;padding:10px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:12px;opacity:.6}
.conv-msg{font-size:11px;padding:4px 0;line-height:1.4;color:var(--text-dim)}
.conv-msg strong{color:var(--text);font-weight:600}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pill{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:var(--accent);padding:8px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.pill:hover{background:rgba(56,189,248,.2);transform:translateY(-1px)}

/* Provider conversation messages */
.prov-msg{padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;margin-bottom:6px;animation:slide-up .3s ease-out}
.prov-msg-provider{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);align-self:flex-end}
.prov-msg-provider .pm-label{color:var(--green);font-size:10px;font-weight:600;margin-bottom:2px}
.prov-msg-patient{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.12)}
.prov-msg-patient .pm-label{color:var(--text-dim);font-size:10px;font-weight:600;margin-bottom:2px}

/* Routing Card */
.route-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .3s}
.route-card.recommended{border-color:var(--green);background:rgba(34,197,94,.05)}
.route-card h4{font-size:14px;font-weight:600;margin-bottom:6px}
.route-card .rc-detail{font-size:12px;color:var(--text-dim);padding:3px 0;display:flex;align-items:center;gap:6px}
.route-card .rc-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--green);color:#fff;margin-bottom:6px}
.route-alt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px}
.route-alt h5{font-size:13px;font-weight:600;margin-bottom:4px}
.route-alt p{color:var(--text-dim);font-size:11px}

/* Action Buttons */
.action-btn{background:var(--accent);color:#0F172A;border:none;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;width:100%;margin-top:10px}
.action-btn:hover{background:#7dd3fc;transform:translateY(-1px)}
.action-btn.green{background:var(--green)}
.action-btn.green:hover{background:#4ade80}

/* Map */
.map-container{border-radius:12px;overflow:hidden;height:220px;border:1px solid var(--border);position:relative}
#routing-map,#routing-map-2{width:100%;height:100%}
.leaflet-tile-pane{filter:invert(1) hue-rotate(200deg) saturate(.8) brightness(.9)}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:1px solid var(--border)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}

/* Reroute provider banner */
.reroute-banner{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);border-radius:12px;padding:16px;animation:slide-down .4s ease-out;display:flex;align-items:center;gap:12px}
.reroute-banner .rb-icon{font-size:24px;flex-shrink:0}
.reroute-banner .rb-text{flex:1;font-size:13px;line-height:1.5}
.reroute-banner .rb-action{flex-shrink:0}

/* ========== CLICKABLE HIGHLIGHT ========== */
.clickable{animation:clickable-ring 1.5s ease-out infinite;cursor:pointer;position:relative}

/* ========== DASHBOARD CAPACITY ========== */
.dash-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:24px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:900px;margin:0 auto 24px}
.cap-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.cap-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cap-bar-name{font-size:13px;font-weight:600}
.cap-bar-type{font-size:10px;color:var(--text-dim);padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.05)}
.cap-bar-pct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.cap-bar-track{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.cap-bar-fill{height:100%;border-radius:4px;transition:width 2s ease,background-color 2s ease}

/* Counter */
.counter-box{text-align:center;margin:24px auto;padding:20px 40px;border-radius:14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);max-width:400px}
.counter-label{font-size:14px;color:var(--text-dim);margin-bottom:6px}
.counter-val{font-size:56px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}

/* What If */
.whatif{display:flex;gap:20px;max-width:600px;margin:20px auto;justify-content:center}
.whatif-card{flex:1;padding:16px 24px;border-radius:12px;text-align:center}
.whatif-card.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.whatif-card.good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}
.whatif-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px}
.whatif-val{font-size:28px;font-weight:800}
.whatif-card.bad .whatif-val{color:var(--red)}
.whatif-card.good .whatif-val{color:var(--green)}

/* ========== SCENE NAV MENU ========== */
.scene-nav-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.scene-nav-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.scene-nav-panel{position:fixed;top:56px;left:0;bottom:0;width:320px;max-width:85vw;background:rgba(15,23,42,.95);backdrop-filter:blur(16px);border-right:1px solid var(--border);z-index:999;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.scene-nav-panel.open{transform:translateX(0)}
.scene-nav-overlay{position:fixed;inset:0;top:56px;background:rgba(0,0,0,.4);z-index:998;opacity:0;pointer-events:none;transition:opacity .3s}
.scene-nav-overlay.open{opacity:1;pointer-events:auto}
.scene-nav-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.scene-nav-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch}
.scene-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:2px;font-size:13px;color:var(--text)}
.scene-nav-item:hover{background:rgba(255,255,255,.05);border-color:var(--border)}
.scene-nav-item.active{background:rgba(56,189,248,.1);border-color:var(--accent);color:var(--accent)}
.scene-nav-item.completed{color:var(--green)}

// Typing: add message char by char
// Speed multiplier: 3 = 3x faster. Change this single value to adjust all demo timing.
const DEMO_SPEED = 3;

function typeMessage(container, role, text, speed = 30) {
  const adjustedSpeed = Math.max(5, Math.round(speed / DEMO_SPEED));
  return new Promise(resolve => {
    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-' + (role === 'patient' ? 'patient' : 'ai');
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = role === 'patient' ? 'You' : 'SILA AI';
    bubble.appendChild(label);
    const span = document.createElement('span');
    bubble.appendChild(span);
    container.appendChild(bubble);
    let i = 0;
    const iv = setInterval(() => {
      if (i < text.length) {
        span.textContent += text[i];
        i++;
        container.scrollTop = container.scrollHeight;
      } else {
        clearInterval(iv);
        container.scrollTop = container.scrollHeight;
        resolve();
      }
    }, adjustedSpeed);
  });
}

function showTyping() {
  const t = $('#phone-typing');
  t.style.display = 'flex';
  $('#phone-messages').scrollTop = $('#phone-messages').scrollHeight;
}
function hideTyping() {
  $('#phone-typing').style.display = 'none';
}

function wait(ms) { return new Promise(r => setTimeout(r, Math.max(50, Math.round(ms / DEMO_SPEED)))); }

function randomDelay(min, max) { return wait(min + Math.random() * (max - min)); }

async function playMessages(messages, container, onCheck) {
  container = container || $('#phone-messages');
  for (const msg of messages) {
    if (msg.role === 'ai') {
      showTyping();
      await randomDelay(1000, 2000);
      hideTyping();
    } else {
      await randomDelay(800, 1500);
    }
    await typeMessage(container, msg.role, msg.text);
    if (onCheck && msg.check !== undefined && msg.check !== null) {
      checkItem(msg.check);
    }
    await randomDelay(500, 1000);
  }
}

function waitForClick(selector, callback) {
  const el = typeof selector === 'string' ? $(selector) : selector;
  if (!el) return;
  el.classList.add('clickable');
  const handler = () => {
    el.classList.remove('clickable');
    el.removeEventListener('click', handler);
    callback();
  };
  el.addEventListener('click', handler);
}

  });
}

function animateCounter(target, duration = 3000) {
  const el = $('#counter-val');
  let current = parseInt(el.textContent) || 0;
  if (current >= target) { el.textContent = target; return; }
  const step = duration / (target - current);
  const iv = setInterval(() => {
    current++;
    el.textContent = current;
    el.style.animation = 'counter-pop .3s ease-out';
    setTimeout(() => { el.style.animation = ''; }, 300);
    if (current >= target) clearInterval(iv);
  }, step);
}

function showWhatIf(erWithout, erWith) {

// ==================== SCENE ENGINE ====================

function enterScene(id) {
  // Find scene by id
  const idx = SCENES.findIndex(s => s.id === id);
  if (idx >= 0) {
    sceneIndex = idx;
    runScene();
  }
}

function runScene() {
  const scene = SCENES[sceneIndex];
  if (!scene) return;
  setSceneLabel(scene.label);
  updateSceneNav();

  // Show/hide continue button based on type
  if (scene.type === 'interactive') {
    hideContinue();
  }

  // Run handler
  const handler = sceneHandlers[scene.id];
  if (handler) handler();
}

function advance() {
  if (sceneIndex >= SCENES.length - 1) return;
  sceneIndex++;
  hideContinue();
  runScene();
}

// Keyboard: right arrow
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') {
    const btn = $('#continue-btn');
    if (btn && btn.classList.contains('visible')) {
      advance();
    }
  }
});

function beginDemo() {
  const launch = $('#launch-screen');
  launch.classList.add('hidden');
  setTimeout(() => { launch.style.display = 'none'; }, 600);
  $('#demo-header').classList.add('visible');
  $('#nav-hamburger').style.display = 'flex';
  buildSceneNav();
  sceneIndex = 0;
  runScene();
}

// ===== SCENE NAVIGATOR =====
function buildSceneNav() {
  const list = $('#scene-nav-list');
  if (!list) return;
  const sections = [
    { label: 'Scenario 1 — Maria', start: '1.1', end: '1.6b' },
    { label: 'Transition', start: 'T', end: 'T' },
    { label: 'Scenario 2 — Robert', start: '2.1', end: '2.5' },
    { label: 'Closing', start: 'C', end: 'C' },
  ];
  let html = '';
  let sectionIdx = 0;
  SCENES.forEach((s, i) => {
    // Add section separator
    if (sectionIdx < sections.length && s.id === sections[sectionIdx].start) {
      html += `<div class="scene-nav-separator">${sections[sectionIdx].label}</div>`;
      sectionIdx++;
    }
    const typeClass = s.type === 'auto' ? 'auto' : 'interactive';
    const typeLabel = s.type === 'auto' ? 'AUTO' : 'CLICK';
    html += `<div class="scene-nav-item" id="snav-${i}" onclick="jumpToScene(${i})" title="${s.label}">
      <div class="scene-nav-dot"></div>
      <span>${s.label}</span>
      <span class="scene-nav-type ${typeClass}">${typeLabel}</span>
    </div>`;
  });
  list.innerHTML = html;
}

function updateSceneNav() {
  SCENES.forEach((s, i) => {
    const el = $(`#snav-${i}`);
    if (!el) return;
    el.classList.toggle('active', i === sceneIndex);
    el.classList.toggle('completed', i < sceneIndex);
  });
  // Scroll active item into view
  const active = $(`#snav-${sceneIndex}`);
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toggleSceneNav() {
  const panel = $('#scene-nav-panel');
  const overlay = $('#scene-nav-overlay');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  if (!isOpen) updateSceneNav();
}

function closeSceneNav() {
  $('#scene-nav-panel').classList.remove('open');
  $('#scene-nav-overlay').classList.remove('open');
}

function jumpToScene(idx) {
  closeSceneNav();
  sceneIndex = idx;
  hideContinue();
  // Set the correct screen for this scene
  const scene = SCENES[idx];
  if (scene) {
    showScreen(scene.screen);
    // Move phone to correct container
    if (scene.screen === 'phone-only') {
      movePhone('screen-phone-only');
    } else if (scene.screen === 'split') {
      movePhone('split-phone');
    }
  }
  runScene();
}
</script>
