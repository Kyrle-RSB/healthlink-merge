<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILA Provider — Provider Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0F172A;--card:#1E293B;--border:#334155;--accent:#38BDF8;
--text:#F1F5F9;--text-dim:#94A3B8;--yellow:#FCBA19;
--red:#EF4444;--orange:#F97316;--amber:#EAB308;--green:#22C55E;--blue:#3B82F6;--purple:#A855F7;--cyan:#06B6D4;--teal:#10B981;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ========== ANIMATIONS ========== */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 5px rgba(34,197,94,.3)}50%{box-shadow:0 0 20px rgba(34,197,94,.6)}}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-in-right{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}
@keyframes bounce-in{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes typing-dots{0%,80%,100%{opacity:.3}40%{opacity:1}}
@keyframes urgent-pulse{0%,100%{border-left-color:var(--red)}50%{border-left-color:transparent}}
@keyframes checkmark{from{transform:scale(0) rotate(-45deg)}to{transform:scale(1) rotate(0deg)}}
@keyframes success-pop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

/* ========== HEADER ========== */
#header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(15,23,42,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between}
#header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple),var(--teal));background-size:200% 100%;animation:gradient-shift 4s linear infinite}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.header-title{font-size:16px;font-weight:700;color:var(--text)}
.header-sub{font-size:12px;color:var(--text-dim);margin-left:8px;padding-left:8px;border-left:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:16px}
.status-connected{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:500}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse-soft 2s ease-in-out infinite}
.header-clock{font-size:13px;color:var(--text-dim);font-variant-numeric:tabular-nums}

/* ========== LAYOUT ========== */
#app{display:flex;height:100vh;padding-top:56px;padding-bottom:44px}

/* ========== SIDEBAR ========== */
#sidebar{width:240px;background:rgba(15,23,42,.6);backdrop-filter:blur(12px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s,opacity .3s;overflow:hidden}
#sidebar.collapsed{width:0;opacity:0;border:none}
.sidebar-toggle{position:fixed;top:64px;left:8px;z-index:101;width:28px;height:28px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent);background:rgba(56,189,248,.06);border-left-color:var(--accent)}
.nav-icon{width:20px;text-align:center;font-size:16px}
.nav-badge{margin-left:auto;background:var(--accent);color:#0F172A;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:var(--text-dim);text-decoration:none;border-radius:8px;transition:all .2s}
.sidebar-link:hover{color:var(--text);background:rgba(255,255,255,.05)}

/* ========== MAIN CONTENT ========== */
#main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

/* ========== QUEUE VIEW ========== */
.queue-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.queue-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.queue-count{background:var(--accent);color:#0F172A;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px}
.sort-controls{display:flex;gap:6px}
.sort-btn{background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.sort-btn:hover{border-color:var(--accent);color:var(--text)}
.sort-btn.active{background:rgba(56,189,248,.12);border-color:var(--accent);color:var(--accent)}

/* ========== PATIENT CARD (Queue) ========== */
.patient-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .3s;animation:slide-up .5s ease-out backwards;display:flex;align-items:center;gap:14px}
.patient-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.patient-card.urgent{animation:slide-up .5s ease-out backwards, urgent-pulse 2s ease-in-out infinite}
.pc-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.pc-middle{flex:1;min-width:0}
.pc-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.pc-name{font-size:14px;font-weight:600}
.pc-demo{font-size:11px;color:var(--text-dim)}
.pc-complaint{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pc-triage-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;color:#fff}
.pc-wait{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
.pc-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.pc-gauge{position:relative;width:44px;height:44px}
.pc-gauge-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.pc-accept{background:var(--green);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.pc-accept:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(34,197,94,.3)}
.pc-ai-strip{width:100%;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);font-size:11px;color:var(--text-dim);font-style:italic;display:flex;justify-content:space-between;align-items:center}
.pc-confidence{font-style:normal;font-weight:600;color:var(--accent);font-size:10px}
/* card wrapper so ai strip is below the flex row */
.patient-card-wrap{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .3s;animation:slide-up .5s ease-out backwards}
.patient-card-wrap:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.patient-card-wrap .pc-row{display:flex;align-items:center;gap:14px}

/* ========== ACTIVE CONVERSATION VIEW ========== */
#convo-view{display:none;flex:1;overflow:hidden}
#convo-view.visible{display:flex;gap:12px}
.convo-left{flex:2;display:flex;flex-direction:column;gap:10px;min-width:0;overflow:hidden}
.convo-right{width:320px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
@media(max-width:1100px){.convo-right{width:280px}}
@media(max-width:900px){#convo-view.visible{flex-direction:column}.convo-right{width:100%}}

/* Patient info bar */
.patient-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pb-left{display:flex;align-items:center;gap:12px}
.pb-name{font-size:16px;font-weight:700}
.pb-details{display:flex;gap:10px;font-size:12px;color:var(--text-dim)}
.pb-triage{font-size:11px;font-weight:600;padding:2px 10px;border-radius:6px;color:#fff}
.back-btn{background:rgba(56,189,248,.15);color:var(--accent);border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.back-btn:hover{background:rgba(56,189,248,.3)}

/* Verification checklist */
.verify-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.verify-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);transition:color .3s}
.verify-item.done{color:var(--green)}
.verify-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .3s}
.verify-item.done .verify-check{background:var(--green);border-color:var(--green);color:#fff}

/* Chat area */
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.chat-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;animation:slide-up .3s ease-out}
.msg-provider{background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.2);align-self:flex-end;border-bottom-right-radius:4px}
.msg-patient{background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.15);align-self:flex-start;border-bottom-left-radius:4px}
.msg-system{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.15);align-self:center;text-align:center;font-size:11px;color:var(--text-dim);max-width:90%}
.msg-label{font-size:10px;font-weight:600;margin-bottom:2px}
.msg-provider .msg-label{color:var(--accent)}
.msg-patient .msg-label{color:var(--text-dim)}
.msg-system .msg-label{color:var(--purple)}
.highlight{color:var(--cyan);font-weight:600}
.typing-indicator{align-self:flex-start;padding:10px 16px;background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.1);border-radius:14px;border-bottom-left-radius:4px;display:flex;gap:4px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim)}
.typing-dot:nth-child(1){animation:typing-dots 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation:typing-dots 1.4s ease-in-out .2s infinite}
.typing-dot:nth-child(3){animation:typing-dots 1.4s ease-in-out .4s infinite}

/* Input area */
.chat-input-area{border-top:1px solid var(--border);padding:10px 14px}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#0F172A;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.chat-send:hover{transform:scale(1.03);box-shadow:0 3px 12px rgba(56,189,248,.3)}

/* AI suggestion pills */
.ai-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ai-pill{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);color:var(--purple);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.ai-pill:hover{background:rgba(168,85,247,.2);border-color:var(--purple);transform:translateY(-1px)}

/* Escalation bar */
.escalation-bar{display:flex;gap:8px;flex-wrap:wrap}
.esc-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.esc-btn:hover{border-color:var(--accent);background:rgba(56,189,248,.06)}

/* ========== RIGHT PANEL ========== */
/* Accordion */
.accordion{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.acc-section{border-bottom:1px solid var(--border)}
.acc-section:last-child{border-bottom:none}
.acc-header{padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.acc-header:hover{background:rgba(255,255,255,.03)}
.acc-body{padding:8px 12px;font-size:11px;color:var(--text-dim);line-height:1.6;display:none}
.acc-section.open .acc-body{display:block}
.acc-arrow{transition:transform .2s;font-size:10px}
.acc-section.open .acc-arrow{transform:rotate(90deg)}

/* Triage gauge (right panel) */
.triage-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px}
.triage-gauge-lg{position:relative;width:80px;height:80px;flex-shrink:0}
.triage-gauge-lg-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.triage-gauge-lg-score{font-size:22px;font-weight:800}
.triage-gauge-lg-label{font-size:8px;color:var(--text-dim)}
.triage-info{flex:1}
.triage-level-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;color:#fff;display:inline-block;margin-bottom:6px}
.triage-rec{font-size:11px;color:var(--text-dim);line-height:1.4}

/* Map */
.map-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;height:180px;position:relative}
#provider-map{width:100%;height:100%}
.leaflet-tile-pane{filter:invert(1) hue-rotate(200deg) saturate(.8) brightness(.9)}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:1px solid var(--border)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}

/* Facility cards */
.facility-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;transition:all .2s}
.facility-card.recommended{border-color:var(--green);box-shadow:0 0 10px rgba(34,197,94,.1)}
.facility-card-label{font-size:9px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.fc-type{font-size:10px;color:var(--text-dim);margin-bottom:6px}
.fc-meta{display:flex;gap:12px;font-size:11px;color:var(--text-dim);margin-bottom:8px}
.fc-meta span{display:flex;align-items:center;gap:4px}
.route-btn{background:var(--green);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;width:100%}
.route-btn:hover{transform:scale(1.02);box-shadow:0 4px 15px rgba(34,197,94,.25)}
.alt-facility{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
.alt-facility .fc-name{font-size:11px;margin:0}
.alt-facility .fc-meta{font-size:10px;margin:0;gap:8px}

/* ========== BOTTOM STATUS BAR ========== */
#bottombar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:44px;background:rgba(15,23,42,.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.bb-stats{display:flex;gap:20px}
.bb-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.bb-stat-value{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.bb-stat-dot{width:8px;height:8px;border-radius:50%}
.bb-active-indicators{display:flex;gap:6px;align-items:center}
.bb-active-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s}
.bb-active-dot:hover{transform:scale(1.15)}

/* ========== MODAL ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fade-in .2s}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:90%;animation:bounce-in .4s ease-out}
.modal-icon{font-size:48px;text-align:center;margin-bottom:12px;animation:success-pop .5s ease-out}
.modal-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px}
.modal-text{font-size:13px;color:var(--text-dim);text-align:center;line-height:1.6;margin-bottom:20px}
.modal-details{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:20px;font-size:12px;line-height:1.8;color:var(--text-dim)}
.modal-details strong{color:var(--text)}
.modal-btn{background:var(--accent);color:#0F172A;border:none;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;transition:all .2s}
.modal-btn:hover{box-shadow:0 4px 15px rgba(56,189,248,.3)}

/* ========== COMPLETED VIEW ========== */
.completed-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;animation:slide-up .4s ease-out}
.completed-card .pc-name{color:var(--text-dim)}
.completed-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(34,197,94,.15);color:var(--green)}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  #sidebar{width:0;opacity:0;border:none;position:fixed;z-index:99;top:56px;bottom:44px;left:0}
  #sidebar.open{width:240px;opacity:1;border-right:1px solid var(--border)}
  .sidebar-toggle{display:flex}
  .convo-right{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <div class="header-logo">CP</div>
    <span class="header-title">SILA Provider</span>
    <span class="header-sub">Provider Dashboard</span>
  </div>
  <div class="header-right">
    <div class="status-connected"><div class="status-dot"></div>Connected</div>
    <div class="header-clock" id="clock"></div>
  </div>
</div>

<!-- SIDEBAR TOGGLE (mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">&#9776;</button>

<!-- APP LAYOUT -->
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-nav">
      <div class="nav-item active" data-view="queue" onclick="switchView('queue')">
        <span class="nav-icon">&#128203;</span> Queue <span class="nav-badge" id="queue-badge">0</span>
      </div>
      <div class="nav-item" data-view="active" onclick="switchView('active')">
        <span class="nav-icon">&#128172;</span> Active Conversations <span class="nav-badge" id="active-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="completed" onclick="switchView('completed')">
        <span class="nav-icon">&#9989;</span> Completed <span class="nav-badge" id="completed-badge" style="display:none;background:var(--green)">0</span>
      </div>

function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
}

function getPatient(id) { return PATIENTS.find(p => p.id === id); }

function formatWait(startTime) {
  const diff = Math.floor((Date.now() - startTime) / 1000);
  if (diff < 60) return `${diff}s`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ${diff%60}s`;
  return `${Math.floor(diff/3600)}h ${Math.floor((diff%3600)/60)}m`;
}

function highlightMedical(text) {
  let result = text;
  MEDICAL_KEYWORDS.forEach(kw => {
    const regex = new RegExp(`(${kw})`, 'gi');
    result = result.replace(regex, '<span class="highlight">$1</span>');
  });
  return result;
}

function triageGaugeSVG(score, color, size) {
  const r = size/2 - 4;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .8s ease"/>
  </svg>`;
}

function getRecommendedFacility(patient) {
  // Match based on routing text
  return FACILITIES.find(f => patient.routing.toLowerCase().includes(f.name.toLowerCase().split(' ')[0])) || FACILITIES[0];
}

function getAlternateFacilities(patient, recommended) {
  return FACILITIES.filter(f => f.id !== recommended.id && f.id !== 'FAC-012').slice(0, 2);
}

// ===================================================================
//  VIEW SWITCHING
// ===================================================================
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));

  document.getElementById('queue-view').style.display = view === 'queue' ? '' : 'none';
  document.getElementById('active-view').style.display = view === 'active' && !activeConvoId ? '' : 'none';
  document.getElementById('completed-view').style.display = view === 'completed' ? '' : 'none';
  document.getElementById('convo-view').className = (view === 'active' && activeConvoId) ? 'visible' : '';

  if (view === 'queue') { activeConvoId = null; renderQueue(); }
  if (view === 'active' && !activeConvoId) renderActiveList();
  if (view === 'completed') renderCompletedList();
}

function openConversation(patientId) {
  activeConvoId = patientId;
  currentView = 'active';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === 'active'));
  document.getElementById('queue-view').style.display = 'none';
  document.getElementById('active-view').style.display = 'none';
  document.getElementById('completed-view').style.display = 'none';
  document.getElementById('convo-view').className = 'visible';
  renderConversation(patientId);
}

// ===================================================================
//  QUEUE RENDERING
// ===================================================================
function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  renderQueue();
}

function getSortedQueue() {
  const patients = queue.map(id => getPatient(id)).filter(Boolean);
  if (currentSort === 'urgency') patients.sort((a,b) => b.triageScore - a.triageScore);
  else if (currentSort === 'wait') patients.sort((a,b) => {
    const aIdx = queue.indexOf(a.id), bIdx = queue.indexOf(b.id);
    return aIdx - bIdx; // earlier in queue = longer wait
  });
  else if (currentSort === 'triage') patients.sort((a,b) => {
    const aLevel = parseInt(a.triageLevel.match(/\d+/)?.[0] || 5);
    const bLevel = parseInt(b.triageLevel.match(/\d+/)?.[0] || 5);
    return aLevel - bLevel;
  });
  return patients;
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  const sorted = getSortedQueue();
  document.getElementById('queue-count').textContent = sorted.length;
  document.getElementById('queue-badge').textContent = sorted.length;

  list.innerHTML = sorted.map((p, i) => {
    const isUrgent = p.triageScore >= 90;
    return `<div class="patient-card-wrap${isUrgent ? ' urgent' : ''}" style="border-left-color:${p.triageColor};animation-delay:${i*0.08}s" onclick="acceptPatient(${p.id})">
      <div class="pc-row">
        <div class="pc-avatar" style="background:${p.triageColor}">${p.initials}</div>
        <div class="pc-middle">

          </div>
          <div class="pc-complaint">${p.complaint}</div>
          <div class="pc-meta">
            <span class="pc-triage-badge" style="background:${p.triageColor}">${p.triageLevel}</span>
            <span class="pc-wait">Waiting ${formatWait(p._queueTime || Date.now())}</span>
          </div>
        </div>
        <div class="pc-right">
          <div class="pc-gauge">
            ${triageGaugeSVG(p.triageScore, p.triageColor, 44)}
            <div class="pc-gauge-text">${p.triageScore}</div>
          </div>
          <button class="pc-accept" onclick="event.stopPropagation();acceptPatient(${p.id})">Accept</button>
        </div>
      </div>
      <div class="pc-ai-strip">
        <span>${p.aiSummary}</span>
        <span class="pc-confidence">${p.confidence}% confidence</span>
      </div>

  }).join('');

  updateBottomBar();
}

// ===================================================================
//  ACCEPT PATIENT
// ===================================================================
function acceptPatient(id) {
  // Remove from queue
  queue = queue.filter(qid => qid !== id);

  // Create active conversation state
  activePatients[id] = {
    askedKeys: [],
    messages: [
      { role:'system', text:'Patient intake complete. AI triage assessment ready for review.' },
      { role:'system', text:`Patient ${getPatient(id).name} has been connected to this session.` }
    ],
    startTime: Date.now(),
    checks: [true, true, false, false, false] // Identity and Health Card verified by intake
  };

  // Switch to conversation
  openConversation(id);
  updateBottomBar();
  renderQueue();
  updateActiveBadge();
}

function renderMessages(patientId) {
  const state = activePatients[patientId];
  const body = document.getElementById('chat-body');
  if (!body || !state) return;

  body.innerHTML = state.messages.map(m => {
    let cls = 'msg-system', label = 'SYSTEM';
    if (m.role === 'provider') { cls = 'msg-provider'; label = 'PROVIDER'; }
    if (m.role === 'patient') { cls = 'msg-patient'; label = 'PATIENT'; }
    return `<div class="msg ${cls}"><div class="msg-label">${label}</div>${highlightMedical(m.text)}</div>`;
  }).join('');

  body.scrollTop = body.scrollHeight;
}

// ===================================================================
//  AI PILLS / SUGGESTIONS
// ===================================================================
function renderPills(patientId) {
  const p = getPatient(patientId);
  const state = activePatients[patientId];
  const pills = document.getElementById('ai-pills');
  if (!pills || !state || !p) return;

  const tree = p.conversationTree;
  const asked = state.askedKeys;

  // Determine which questions to suggest
  let suggestions = [];

  // If nothing asked yet, start with initial questions
  if (asked.length === 0) {
    suggestions = Object.keys(tree).slice(0, 4);
  } else {
    // Get follow-ups from last asked question
    const lastKey = asked[asked.length - 1];
    const lastNode = tree[lastKey];
    if (lastNode && lastNode.followUp) {
      suggestions = lastNode.followUp.filter(k => !asked.includes(k));
    }
    // Fill remaining with un-asked questions
    const remaining = Object.keys(tree).filter(k => !asked.includes(k) && !suggestions.includes(k));
    while (suggestions.length < 4 && remaining.length > 0) {
      suggestions.push(remaining.shift());
    }
  }

  suggestions = suggestions.slice(0, 4);

  pills.innerHTML = suggestions.map(key => {
    const node = tree[key];
    if (!node) return '';
    return `<button class="ai-pill" onclick="askQuestion(${patientId},'${key}')">${node.question}</button>`;
  }).join('');
}

// ===================================================================
//  MESSAGING
// ===================================================================
function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input || !activeConvoId) return;
  const text = input.value.trim();
  if (!text) return;

  const state = activePatients[activeConvoId];
  state.messages.push({ role: 'provider', text });
  input.value = '';
  renderMessages(activeConvoId);

  // Check for partial match to tree
  const p = getPatient(activeConvoId);
  const tree = p.conversationTree;
  const asked = state.askedKeys;

  // Try to find a matching question
  let matchKey = null;
  for (const key of Object.keys(tree)) {
    if (asked.includes(key)) continue;
    const q = tree[key].question.toLowerCase();
    const t = text.toLowerCase();
    // Simple keyword matching
    const qWords = q.split(/\s+/).filter(w => w.length > 3);
    const matchCount = qWords.filter(w => t.includes(w)).length;
    if (matchCount >= 2) { matchKey = key; break; }
  }

  if (matchKey) {
    state.askedKeys.push(matchKey);
    showTypingThenRespond(activeConvoId, tree[matchKey].response);
    updateChecks(activeConvoId, matchKey);
  } else {
    // Generic response
    showTypingThenRespond(activeConvoId, "I understand. Could you ask me something more specific about my symptoms or medical history?");
  }
}

function askQuestion(patientId, key) {
  const p = getPatient(patientId);
  const state = activePatients[patientId];
  const tree = p.conversationTree;
  const node = tree[key];
  if (!node || !state) return;

  state.askedKeys.push(key);
  state.messages.push({ role: 'provider', text: node.question });
  renderMessages(patientId);

  showTypingThenRespond(patientId, node.response);
  updateChecks(patientId, key);
  renderPills(patientId);
}

function showTypingThenRespond(patientId, response) {
  const body = document.getElementById('chat-body');
  if (!body) return;

  // Show typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.id = 'typing';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  setTimeout(() => {
    const t = document.getElementById('typing');
    if (t) t.remove();
    const state = activePatients[patientId];
    if (state) {
      state.messages.push({ role: 'patient', text: response });
      renderMessages(patientId);
      renderPills(patientId);
    }
  }, 800 + Math.random() * 700);
}

function updateChecks(patientId, key) {
  const state = activePatients[patientId];
  // Check Symptoms (index 2) after pain/symptom questions
  if (['pain_scale','pain_location','pain_duration','associated_symptoms','onset'].includes(key)) {
    state.checks[2] = true;
  }
  // Check History (index 3) after history/medication/allergy questions
  if (['history','medications','allergies_check','previous_episodes'].includes(key)) {
    state.checks[3] = true;
  }
  // Check Triage (index 4) after 5+ questions asked
  if (state.askedKeys.length >= 5) {
    state.checks[4] = true;
  }
  // Update DOM
  const bar = document.getElementById('verify-bar');
  if (bar) {
    state.checks.forEach((done, i) => {
      const el = document.getElementById(`check-${i}`);
      if (el && done) {
        el.classList.add('done');
        el.querySelector('.verify-check').innerHTML = '&#10003;';
      }
    });
  }
}

function routePatient(patientId, facilityName) {
  const p = getPatient(patientId);

  // Show modal
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'route-modal';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-icon">&#9989;</div>
      <div class="modal-title">Patient Routed Successfully</div>
      <div class="modal-text">${p.name} has been routed to the selected facility.</div>
      <div class="modal-details">
        <strong>Patient:</strong> ${p.name} (${p.age}${p.sex})<br>
        <strong>Triage Level:</strong> ${p.triageLevel}<br>
        <strong>Facility:</strong> ${facilityName}<br>
        <strong>Time:</strong> ${new Date().toLocaleTimeString()}<br>
        <strong>Questions Asked:</strong> ${activePatients[patientId]?.askedKeys.length || 0}<br>
        <strong>AI Confidence:</strong> ${p.confidence}%
      </div>
      <button class="modal-btn" onclick="closeRouteModal(${patientId})">Return to Queue</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function closeRouteModal(patientId) {
  const modal = document.getElementById('route-modal');
  if (modal) modal.remove();

  const p = getPatient(patientId);
  completedPatients.push({
    patient: p,
    facility: p.routing,
    time: new Date().toLocaleTimeString(),
    questionsAsked: activePatients[patientId]?.askedKeys.length || 0
  });

  delete activePatients[patientId];
  activeConvoId = null;
  switchView('queue');
  updateBottomBar();
  updateActiveBadge();
  updateCompletedBadge();
}

// ===================================================================
//  MAP
// ===================================================================
function initMap(recommended) {
  const container = document.getElementById('provider-map');
  if (!container) return;

  // Destroy previous if exists
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }

  leafletMap = L.map('provider-map', { zoomControl: true, attributionControl: false }).setView([48.4556, -123.3856], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);

  FACILITIES.forEach(f => {
    if (f.type === 'Virtual') return;
    const isRec = f.id === recommended.id;
    const marker = L.circleMarker([f.lat, f.lng], {
      radius: isRec ? 10 : 6,
      fillColor: f.color,
      color: isRec ? '#fff' : f.color,
      weight: isRec ? 3 : 1,
      fillOpacity: 0.8
    }).addTo(leafletMap);
    marker.bindTooltip(`<strong>${f.name}</strong><br>${f.type} &bull; ${f.wait}`, {
      direction: 'top',
      className: ''
    });
  });

  // Center on recommended
  leafletMap.setView([recommended.lat, recommended.lng], 12);

  // Fix map rendering
  setTimeout(() => leafletMap.invalidateSize(), 200);
}

  document.getElementById('bb-completed').textContent = completedPatients.length;

  // Active indicators
  const indicators = document.getElementById('bb-indicators');
  indicators.innerHTML = Object.keys(activePatients).map(id => {
    const p = getPatient(parseInt(id));
    return `<div class="bb-active-dot" style="background:${p.triageColor}" title="${p.name}" onclick="openConversation(${p.id})">${p.initials}</div>`;
  }).join('');
}

function updateActiveBadge() {
  const count = Object.keys(activePatients).length;
  const badge = document.getElementById('active-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? '' : 'none';
}

function updateCompletedBadge() {
  const count = completedPatients.length;
  const badge = document.getElementById('completed-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? '' : 'none';
}

// ===================================================================
//  SIMULATION ENGINE
// ===================================================================
function addToQueue(patientId) {
  const p = getPatient(patientId);
  if (!p) return;
  p._queueTime = Date.now();
  queue.push(patientId);
  renderQueue();
  updateBottomBar();
}

function startSimulation() {
  // Wave 1: 3 patients after 2s (staggered 1s each)
  setTimeout(() => addToQueue(1), 2000);
  setTimeout(() => addToQueue(2), 3000);
  setTimeout(() => addToQueue(3), 4000);

  // Wave 2: 2 more after ~10s
  setTimeout(() => addToQueue(4), 10000);
  setTimeout(() => addToQueue(5), 11000);

  // Wave 3: 1 more after ~20s
  setTimeout(() => addToQueue(6), 20000);
}

// ===================================================================
//  WAIT TIME UPDATER
// ===================================================================
function startWaitUpdater() {
  setInterval(() => {
    // Update wait times in queue cards
    document.querySelectorAll('.pc-wait').forEach(el => {
      // Only update queue items (not active)
    });
    if (currentView === 'queue') renderQueue();
    if (currentView === 'active' && !activeConvoId) renderActiveList();
    updateBottomBar();
  }, 5000);
}

// ===================================================================
//  INIT
// ===================================================================
function init() {
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
  renderQueue();
  startSimulation();
  startWaitUpdater();
}

init();
</script>
</body>
</html>
